<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#080818"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>

    <!-- Neon pink glow filter -->
    <filter id="neonPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Neon cyan glow filter -->
    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Neon magenta glow -->
    <filter id="neonMagenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feGaussianBlur stdDeviation="7" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for accents -->
    <filter id="subtleGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rain effect gradient -->
    <linearGradient id="rainDrop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6eb4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ff6eb4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff6eb4" stop-opacity="0"/>
    </linearGradient>

    <!-- Urban glow at bottom -->
    <linearGradient id="urbanGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6eb4" stop-opacity="0"/>
      <stop offset="70%" stop-color="#ff6eb4" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#4de8ff" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#urbanGlow)"/>

  <!-- Background geometric grid lines — subtle city structure -->
  <g stroke="#1a3a6a" stroke-width="0.3" opacity="0.3">
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
  </g>

  <!-- Neon rain streaks — vertical lines suggesting rain -->
  <g opacity="0.15">
    <line x1="85" y1="50" x2="82" y2="180" stroke="#ff6eb4" stroke-width="1"/>
    <line x1="180" y1="80" x2="177" y2="200" stroke="#4de8ff" stroke-width="0.8"/>
    <line x1="420" y1="30" x2="418" y2="150" stroke="#ff6eb4" stroke-width="0.8"/>
    <line x1="510" y1="100" x2="508" y2="220" stroke="#4de8ff" stroke-width="1"/>
    <line x1="350" y1="60" x2="348" y2="170" stroke="#c84dff" stroke-width="0.8"/>
    <line x1="55" y1="280" x2="53" y2="380" stroke="#4de8ff" stroke-width="0.8"/>
    <line x1="540" y1="300" x2="538" y2="400" stroke="#ff6eb4" stroke-width="0.8"/>
    <line x1="260" y1="400" x2="258" y2="480" stroke="#c84dff" stroke-width="0.7"/>
  </g>

  <!-- Main neon sign frame — rectangular border like a Japanese sign -->
  <rect x="120" y="140" width="360" height="280" rx="6" fill="none" stroke="#ff6eb4" stroke-width="2.5" filter="url(#neonPink)" opacity="0.9"/>
  <rect x="130" y="150" width="340" height="260" rx="4" fill="none" stroke="#ff6eb4" stroke-width="0.8" opacity="0.4"/>

  <!-- Inner frame accent lines -->
  <line x1="140" y1="155" x2="460" y2="155" stroke="#ff6eb4" stroke-width="0.5" opacity="0.3"/>
  <line x1="140" y1="405" x2="460" y2="405" stroke="#ff6eb4" stroke-width="0.5" opacity="0.3"/>

  <!-- Corner neon accents on the frame -->
  <g stroke="#4de8ff" stroke-width="2" filter="url(#neonCyan)" opacity="0.8">
    <!-- Top-left corner -->
    <line x1="108" y1="140" x2="120" y2="140"/>
    <line x1="120" y1="128" x2="120" y2="140"/>
    <!-- Top-right corner -->
    <line x1="480" y1="140" x2="492" y2="140"/>
    <line x1="480" y1="128" x2="480" y2="140"/>
    <!-- Bottom-left corner -->
    <line x1="108" y1="420" x2="120" y2="420"/>
    <line x1="120" y1="420" x2="120" y2="432"/>
    <!-- Bottom-right corner -->
    <line x1="480" y1="420" x2="492" y2="420"/>
    <line x1="480" y1="420" x2="480" y2="432"/>
  </g>

  <!-- Title text — neon glow style -->
  <text x="300" y="235" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ff6eb4" text-anchor="middle" letter-spacing="4" filter="url(#neonPink)">NEON</text>
  <text x="300" y="300" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#4de8ff" text-anchor="middle" letter-spacing="4" filter="url(#neonCyan)">LIGHTS</text>

  <!-- Horizontal divider between title rows -->
  <line x1="180" y1="255" x2="420" y2="255" stroke="#c84dff" stroke-width="1" filter="url(#neonMagenta)" opacity="0.5"/>

  <!-- Artist name -->
  <text x="300" y="380" font-family="system-ui, sans-serif" font-size="18" font-weight="400" fill="#c84dff" text-anchor="middle" letter-spacing="10" filter="url(#neonMagenta)" opacity="0.9">SAM</text>

  <!-- Pulsing synth wave visualization at bottom of sign -->
  <g transform="translate(0, 395)" stroke="#4de8ff" fill="none" stroke-width="1.5" filter="url(#subtleGlow)" opacity="0.6">
    <path d="M155 0 Q170 -15, 185 0 T215 0 T245 0 T275 0 T305 0 T335 0 T365 0 T395 0 T425 0 T445 0"/>
  </g>
  <g transform="translate(0, 398)" stroke="#ff6eb4" fill="none" stroke-width="1" filter="url(#subtleGlow)" opacity="0.4">
    <path d="M160 0 Q175 10, 190 0 T220 0 T250 0 T280 0 T310 0 T340 0 T370 0 T400 0 T430 0 T440 0"/>
  </g>

  <!-- Decorative neon circles — like city lights -->
  <g filter="url(#subtleGlow)">
    <circle cx="80" cy="100" r="4" fill="#ff6eb4" opacity="0.6"/>
    <circle cx="520" cy="80" r="3" fill="#4de8ff" opacity="0.5"/>
    <circle cx="50" cy="480" r="3" fill="#c84dff" opacity="0.5"/>
    <circle cx="550" cy="500" r="4" fill="#ff6eb4" opacity="0.6"/>
    <circle cx="540" cy="200" r="2.5" fill="#4de8ff" opacity="0.4"/>
    <circle cx="60" cy="220" r="2" fill="#ff6eb4" opacity="0.4"/>
  </g>

  <!-- Neon horizontal lines — like reflections on wet streets -->
  <g opacity="0.15">
    <line x1="0" y1="470" x2="600" y2="470" stroke="#ff6eb4" stroke-width="0.8"/>
    <line x1="50" y1="490" x2="550" y2="490" stroke="#4de8ff" stroke-width="0.6"/>
    <line x1="100" y1="510" x2="500" y2="510" stroke="#c84dff" stroke-width="0.5"/>
    <line x1="150" y1="530" x2="450" y2="530" stroke="#ff6eb4" stroke-width="0.4"/>
    <line x1="180" y1="550" x2="420" y2="550" stroke="#4de8ff" stroke-width="0.3"/>
  </g>

  <!-- Scattered light reflections — bokeh effect -->
  <g filter="url(#subtleGlow)">
    <circle cx="150" cy="480" r="6" fill="#ff6eb4" opacity="0.08"/>
    <circle cx="300" cy="500" r="8" fill="#4de8ff" opacity="0.06"/>
    <circle cx="450" cy="490" r="5" fill="#c84dff" opacity="0.08"/>
    <circle cx="200" cy="520" r="4" fill="#4de8ff" opacity="0.06"/>
    <circle cx="400" cy="530" r="6" fill="#ff6eb4" opacity="0.06"/>
    <circle cx="250" cy="540" r="3" fill="#c84dff" opacity="0.05"/>
    <circle cx="350" cy="555" r="5" fill="#ff6eb4" opacity="0.04"/>
  </g>

  <!-- Title repeated subtly at very bottom as a reflection -->
  <text x="300" y="585" font-family="system-ui, sans-serif" font-size="10" font-weight="300" fill="#4de8ff" text-anchor="middle" letter-spacing="6" opacity="0.15">NEON LIGHTS</text>
</svg>
