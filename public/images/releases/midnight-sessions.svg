<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <!-- Sky gradient: dusk to deep night -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="30%" stop-color="#12123a"/>
      <stop offset="55%" stop-color="#1a1a4e"/>
      <stop offset="75%" stop-color="#2a1a4a"/>
      <stop offset="90%" stop-color="#3d1a3a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Horizon glow: warm amber at the city line -->
    <linearGradient id="horizonGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a050" stop-opacity="0"/>
      <stop offset="60%" stop-color="#e8a050" stop-opacity="0.06"/>
      <stop offset="85%" stop-color="#d4783a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </linearGradient>

    <!-- Building silhouette gradient -->
    <linearGradient id="buildings" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#080815"/>
    </linearGradient>

    <!-- Moon glow -->
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#e8e0ff" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#c4b8e8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>

    <!-- Star twinkle filter -->
    <filter id="twinkle">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Window glow -->
    <filter id="windowGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Sky background -->
  <rect width="600" height="600" fill="url(#sky)"/>

  <!-- Stars — scattered across upper sky -->
  <g fill="#ffffff" opacity="0.6" filter="url(#twinkle)">
    <circle cx="80" cy="60" r="1"/>
    <circle cx="150" cy="35" r="1.2"/>
    <circle cx="230" cy="80" r="0.8"/>
    <circle cx="320" cy="45" r="1"/>
    <circle cx="410" cy="70" r="1.3"/>
    <circle cx="480" cy="30" r="0.9"/>
    <circle cx="550" cy="90" r="1.1"/>
    <circle cx="50" cy="120" r="0.7"/>
    <circle cx="190" cy="140" r="1"/>
    <circle cx="360" cy="110" r="0.8"/>
    <circle cx="520" cy="140" r="1.2"/>
    <circle cx="100" cy="180" r="0.6"/>
    <circle cx="270" cy="25" r="1.4"/>
    <circle cx="440" cy="160" r="0.7"/>
    <circle cx="560" cy="55" r="0.9"/>
    <circle cx="30" cy="200" r="1"/>
    <circle cx="350" cy="180" r="0.6"/>
    <circle cx="160" cy="100" r="0.5"/>
  </g>

  <!-- Dimmer background stars -->
  <g fill="#b0a0c8" opacity="0.3">
    <circle cx="120" cy="50" r="0.5"/>
    <circle cx="300" cy="90" r="0.6"/>
    <circle cx="460" cy="120" r="0.5"/>
    <circle cx="200" cy="160" r="0.4"/>
    <circle cx="500" cy="80" r="0.5"/>
    <circle cx="380" cy="30" r="0.6"/>
    <circle cx="70" cy="150" r="0.4"/>
    <circle cx="530" cy="170" r="0.5"/>
  </g>

  <!-- Moon -->
  <circle cx="460" cy="120" r="50" fill="url(#moonGlow)"/>
  <circle cx="460" cy="120" r="18" fill="#e8e0ff" opacity="0.85"/>
  <circle cx="455" cy="115" r="3" fill="#d4c8e8" opacity="0.3"/>
  <circle cx="465" cy="125" r="2" fill="#d4c8e8" opacity="0.2"/>

  <!-- Horizon atmospheric glow -->
  <rect x="0" y="280" width="600" height="120" fill="url(#horizonGlow)"/>

  <!-- Distant city glow on horizon -->
  <g opacity="0.08">
    <rect x="0" y="330" width="600" height="4" fill="#e8a050"/>
    <rect x="0" y="336" width="600" height="2" fill="#d4783a"/>
  </g>

  <!-- Cityscape silhouette — layer 1: distant buildings -->
  <g fill="#0f0f25" opacity="0.7">
    <rect x="20" y="320" width="35" height="80"/>
    <rect x="65" y="300" width="25" height="100"/>
    <rect x="100" y="310" width="40" height="90"/>
    <rect x="155" y="290" width="20" height="110"/>
    <rect x="185" y="315" width="30" height="85"/>
    <rect x="230" y="295" width="25" height="105"/>
    <rect x="270" y="310" width="45" height="90"/>
    <rect x="330" y="285" width="18" height="115"/>
    <rect x="360" y="305" width="35" height="95"/>
    <rect x="410" y="320" width="25" height="80"/>
    <rect x="450" y="300" width="40" height="100"/>
    <rect x="505" y="315" width="30" height="85"/>
    <rect x="550" y="310" width="35" height="90"/>
  </g>

  <!-- Cityscape silhouette — layer 2: foreground buildings -->
  <g fill="url(#buildings)">
    <!-- Left cluster -->
    <rect x="0" y="360" width="50" height="240"/>
    <rect x="55" y="340" width="35" height="260"/>
    <rect x="95" y="355" width="25" height="245"/>
    <rect x="125" y="330" width="45" height="270"/>
    <rect x="175" y="350" width="30" height="250"/>

    <!-- Center cluster — taller buildings -->
    <rect x="210" y="310" width="20" height="290"/>
    <polygon points="210,310 220,290 230,310"/>
    <rect x="235" y="340" width="40" height="260"/>
    <rect x="280" y="320" width="25" height="280"/>
    <rect x="310" y="345" width="35" height="255"/>

    <!-- Right cluster -->
    <rect x="350" y="355" width="30" height="245"/>
    <rect x="385" y="335" width="40" height="265"/>
    <rect x="430" y="350" width="25" height="250"/>
    <rect x="460" y="325" width="35" height="275"/>
    <polygon points="460,325 477,305 495,325"/>
    <rect x="500" y="355" width="30" height="245"/>
    <rect x="535" y="340" width="40" height="260"/>
    <rect x="580" y="360" width="25" height="240"/>
  </g>

  <!-- Building windows — warm lit rectangles -->
  <g fill="#e8a050" opacity="0.6" filter="url(#windowGlow)">
    <!-- Left buildings -->
    <rect x="62" y="350" width="4" height="3"/>
    <rect x="70" y="365" width="4" height="3"/>
    <rect x="62" y="380" width="4" height="3"/>
    <rect x="135" y="345" width="4" height="3"/>
    <rect x="145" y="360" width="4" height="3"/>
    <rect x="135" y="375" width="4" height="3"/>
    <rect x="155" y="345" width="4" height="3"/>
    <rect x="145" y="390" width="4" height="3"/>

    <!-- Center buildings -->
    <rect x="245" y="355" width="4" height="3"/>
    <rect x="255" y="370" width="4" height="3"/>
    <rect x="245" y="385" width="4" height="3"/>
    <rect x="265" y="355" width="4" height="3"/>
    <rect x="288" y="335" width="4" height="3"/>
    <rect x="288" y="355" width="4" height="3"/>
    <rect x="288" y="375" width="4" height="3"/>

    <!-- Right buildings -->
    <rect x="395" y="350" width="4" height="3"/>
    <rect x="405" y="365" width="4" height="3"/>
    <rect x="395" y="380" width="4" height="3"/>
    <rect x="415" y="350" width="4" height="3"/>
    <rect x="470" y="340" width="4" height="3"/>
    <rect x="480" y="355" width="4" height="3"/>
    <rect x="470" y="370" width="4" height="3"/>
    <rect x="490" y="340" width="4" height="3"/>
    <rect x="545" y="355" width="4" height="3"/>
    <rect x="555" y="370" width="4" height="3"/>
    <rect x="545" y="385" width="4" height="3"/>
    <rect x="565" y="355" width="4" height="3"/>
  </g>

  <!-- Cool-toned windows (some offices still lit) -->
  <g fill="#80b8e8" opacity="0.4" filter="url(#windowGlow)">
    <rect x="70" y="395" width="4" height="3"/>
    <rect x="145" y="405" width="4" height="3"/>
    <rect x="255" y="400" width="4" height="3"/>
    <rect x="405" y="395" width="4" height="3"/>
    <rect x="480" y="385" width="4" height="3"/>
    <rect x="555" y="400" width="4" height="3"/>
    <rect x="215" y="325" width="4" height="3"/>
  </g>

  <!-- Road / ground level line -->
  <rect x="0" y="580" width="600" height="20" fill="#080810"/>

  <!-- Subtle road reflection lines -->
  <g stroke="#e8a050" stroke-width="0.5" opacity="0.05">
    <line x1="100" y1="590" x2="500" y2="590"/>
    <line x1="150" y1="595" x2="450" y2="595"/>
  </g>

  <!-- Title text — positioned in the sky area -->
  <text x="300" y="240" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#e0d8f0" text-anchor="middle" letter-spacing="3">MIDNIGHT</text>
  <text x="300" y="272" font-family="system-ui, sans-serif" font-size="24" font-weight="300" fill="#b0a0c8" text-anchor="middle" letter-spacing="8">SESSIONS</text>

  <!-- Artist name -->
  <text x="300" y="565" font-family="system-ui, sans-serif" font-size="13" font-weight="400" fill="#8a7a9e" text-anchor="middle" letter-spacing="5">SAM</text>
</svg>
